# Mock the OpenAI API with Docker
# Usage: docker compose up
# Then:  curl http://localhost:4280/models | jq

services:
  mockd:
    image: ghcr.io/getmockd/mockd:0.6
    ports:
      - "4280:4280"
      - "4290:4290"
    volumes:
      - .:/config
    command: ["start", "-c", "/config/mockd.yaml", "--no-auth"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4290/health"]
      interval: 5s
      timeout: 3s
      retries: 10
